name: 🧬 Projeto Chimera - Bot Imortal

on:
  workflow_dispatch:
  repository_dispatch:
    types: [despertar_bot]

jobs:
  executar_ciclo:
    runs-on: ubuntu-latest
    concurrency: bot_execucao
    
    steps:
      - name: 📥 Baixar código
        uses: actions/checkout@v4
        
      - name: 🔧 Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: 📝 Criar arquivo .env
        run: |
          echo "ROBLOX_COOKIE=${{ secrets.ROBLOX_COOKIE }}" > .env
          echo "✅ Arquivo .env criado!"
          
      - name: 📦 Instalar dependências
        run: npm install
        
      - name: 👻 EXECUTAR O FANTASMA 👻
        run: node index.js
