name: 🧬 Projeto Chimera - Bot Imortal

on:
  workflow_dispatch:  # ← ADICIONE ESTA LINHA (gatilho manual)
  repository_dispatch:
    types: [despertar_bot]

jobs:
  executar_ciclo:
    runs-on: ubuntu-latest
    concurrency: bot_execucao
    
    steps:
      - name: 📥 Baixar código
        uses: actions/checkout@v4
        
      - name: 🔧 Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: 📦 Instalar dependências
        run: npm install
        
      - name: 👻 EXECUTAR O FANTASMA 👻
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          ROBLOX_COOKIE: ${{ secrets.ROBLOX_COOKIE }}
          MAX_EXECUTION_SECONDS: 21000
        run: node index.js
